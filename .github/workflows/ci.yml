name: ci

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo; nothing here needs write access to contents, PRs, or packages.
permissions:
  contents: read

# A newer push to the same ref supersedes any in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The CI gate mirrors `task ci` exactly, so local and CI verdicts never diverge. The full lane
# runs on macOS (the launch runtime — the keychain shells out to macOS `security`) and Ubuntu.
jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (no secret ever enters history)
        run: bash scripts/secret-scan.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (hoisted workspaces)
        env:
          # CI never launches the GUI — skip Electron's ~250MB binary download to keep the lane fast.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Test-collection audit (fail on uncollected test files)
        run: bash scripts/test-collection-audit.sh

      - name: Typecheck every app
        run: npm run typecheck --workspaces --if-present

      - name: Typecheck the root scripts (smokes + demo runner)
        run: npx tsc --noEmit -p tsconfig.scripts.json

      - name: Test every app (hermetic)
        run: npm run test --workspaces --if-present

      - name: Invariant gates (the five release-gate suites + registry meta-check)
        run: |
          npm run test --workspace @buildex/client -- -t "release-gate:"
          npm run test --workspace @buildex/connectors -- -t "release-gate:"
          npm run test --workspace @buildex/sync -- -t "release-gate:"

      - name: Cross-module smoke (GATE-1 whole-platform loop)
        run: npx tsx scripts/cross-module-smoke.ts

  # Windows is a supported client runtime: the app launches, drives the operator's `claude`, and keeps
  # secrets in Credential Manager. So this lane RUNS the client suite - not just a typecheck. Without
  # it, every Windows-parametrized path (the .cmd-shim resolver, junction tests, path.win32
  # assertions, backslash normalization, the Credential Manager backend) would merge unverified on
  # the strength of a one-time dev-machine run.
  #
  # `apps/sync` is deliberately excluded: it is the Linux-only cloud service, and its suite has
  # pre-existing Windows-only failures (EBUSY on rmSync in teardown - Windows holds the SQLite handle
  # after close()). It is fully covered by the `gate` lane on Ubuntu and macOS.
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (hoisted workspaces)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Typecheck every app
        run: npm run typecheck --workspaces --if-present

      # The full client suite already includes the release-gate: suites, so there is no separate gate
      # step here - unlike the `gate` job, where the explicit run names which of three workspaces
      # failed. Re-running the subset on the slowest runner would buy signal we already have.
      - name: Test the client on Windows (the supported client runtime)
        run: npm run test --workspace @buildex/client
