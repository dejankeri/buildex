# buildex - thin task coordinator. Per-app builds stay native (npm);
# this file only orchestrates. Run `task` to list, `task ci` for the full gate.
version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install all workspace dependencies (hoisted to root)
    cmds:
      - npm install

  typecheck:
    desc: Typecheck every app (tsc --noEmit)
    cmds:
      - npm run typecheck --workspaces --if-present

  typecheck:scripts:
    desc: "Typecheck the repo-root scripts + apps/client/scripts (outside every workspace tsconfig)"
    cmds:
      - npx tsc --noEmit -p tsconfig.scripts.json

  test:
    desc: Run every app's hermetic test suite (vitest)
    cmds:
      - npm run test --workspaces --if-present

  invariants:
    desc: "Run ONLY the six release-gate invariant suites + the registry meta-check"
    cmds:
      # `-t release-gate:` selects exactly the tagged suites across the three apps that own them:
      # client (secrets, sync-safety, determinism, no-token-on-disk, + registry), connectors (gates),
      # sync (permission-matrix). The registry meta-test fails if the tagged set ever drifts from the six.
      - npm run test --workspace @buildex/client -- -t "release-gate:"
      - npm run test --workspace @buildex/connectors -- -t "release-gate:"
      - npm run test --workspace @buildex/sync -- -t "release-gate:"

  smoke:
    desc: "Cross-module smoke - the GATE-1 whole-platform loop (deterministic; no real agent)"
    cmds:
      - npx tsx scripts/cross-module-smoke.ts

  smoke:live:
    desc: "Live smoke - drives the REAL claude CLI + gate hook (manual release step; spends usage)"
    cmds:
      - npx tsx apps/client/scripts/live-smoke.ts

  check:electron:
    desc: "Guard: electron-builder.yml electronVersion matches the resolved electron in package-lock.json"
    cmds:
      - node scripts/check-electron-version.mjs

  secret-scan:
    desc: "Invariant: no secret/credential/client detail ever enters git history"
    cmds:
      - bash scripts/secret-scan.sh

  test-collection-audit:
    desc: "CI fails on silently-uncollected test files (glob/runner mismatch)"
    cmds:
      - bash scripts/test-collection-audit.sh

  ci:
    desc: The full local gate - mirrors .github/workflows/ci.yml
    cmds:
      - task: secret-scan
      - task: test-collection-audit
      - task: typecheck
      - task: typecheck:scripts
      - task: test
      - task: invariants
      - task: smoke

  mint-setup-token:
    desc: "Onboard an operator and print a one-time setup token (needs BUILDEX_SERVICE_KEY)"
    cmds:
      - npx tsx scripts/mint-setup-token.ts {{.CLI_ARGS}}

  # infra/fly.toml carries no app identity (public repo) - FLY_APP (required) comes from the
  # untracked infra/.env. Copy infra/.env.example to infra/.env and set FLY_APP before deploying.
  # Region is NOT passed to `fly deploy` - flyctl has no --region flag for it; a first deploy places
  # the machine in the region of its mounted volume, so choose the region when you create that volume
  # (`fly volumes create buildex_data --region <r>`). FLY_REGION in infra/.env is informational only.
  deploy:plan:
    desc: "Dry-run: build the sync image and show what would deploy (no side effects)"
    cmds:
      - docker build -f apps/sync/Dockerfile -t buildex-sync .
      - |
        set -eu
        [ -f infra/.env ] && set -a && . infra/.env && set +a
        if [ -z "${FLY_APP:-}" ]; then
          echo "FLY_APP is not set. Copy infra/.env.example to infra/.env and set FLY_APP before deploying." >&2
          exit 1
        fi
        fly deploy --config infra/fly.toml --dockerfile apps/sync/Dockerfile --app "$FLY_APP" --build-only
      - echo "- dry-run only. Run 'task deploy' to apply (gated)."

  deploy:
    desc: "Deploy the sync service to Fly (gated - dry-run runs first, then asks before applying)"
    prompt: "Apply this deploy to the sync service?"
    deps: [deploy:plan]
    cmds:
      - |
        set -eu
        [ -f infra/.env ] && set -a && . infra/.env && set +a
        if [ -z "${FLY_APP:-}" ]; then
          echo "FLY_APP is not set. Copy infra/.env.example to infra/.env and set FLY_APP before deploying." >&2
          exit 1
        fi
        fly deploy --config infra/fly.toml --dockerfile apps/sync/Dockerfile --app "$FLY_APP"

  restore-drill:
    desc: "Rehearse recovery: restore control.db + repos onto a clean target and verify"
    cmds:
      - npm run test --workspace @buildex/sync -- restore-drill

  audit-history:
    desc: "Scan ALL git history for secrets (not just the current tree)"
    cmds:
      - npx tsx scripts/audit-history.ts

  screenshots:
    desc: "Regenerate docs/images/*.png from a fresh demo org (maintainer tool; needs gstack /browse)"
    cmds:
      - bash scripts/capture-screenshots.sh
