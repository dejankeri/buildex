# buildex sync - deployment stack. One small VM, Docker Compose: the sync
# service behind a TLS reverse proxy, with continuous SQLite replication. 12-factor throughout, so
# re-hosting is configuration, not a rewrite.
#
# PUBLIC REPO - no live values. Real hosts, keys, and object-storage targets live in the private
# infra repo and are supplied via an untracked infra/.env at deploy time.
services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - sync

  sync:
    build: ../apps/sync
    restart: unless-stopped
    environment:
      # Supplied from infra/.env (untracked). Never bake secrets into the image.
      - BUILDEX_SERVICE_KEY=${BUILDEX_SERVICE_KEY:?set in infra/.env}
      - BUILDEX_JWT_SECRET=${BUILDEX_JWT_SECRET:?set in infra/.env}
      - BUILDEX_DATA_DIR=/srv/buildex
    volumes:
      - buildex_data:/srv/buildex   # /srv/buildex/{control.db, repos}
    expose:
      - "8080"

  litestream:
    image: litestream/litestream:0.3
    restart: unless-stopped
    command: replicate
    volumes:
      - buildex_data:/srv/buildex
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID:?set in infra/.env}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY:?set in infra/.env}
    depends_on:
      - sync

volumes:
  buildex_data:
  caddy_data:
